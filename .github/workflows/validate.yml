name: Validate Benchmark Data

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate dataset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sample dataset
        run: python scripts/validate_dataset.py data/sample_alerts.jsonl

      - name: Check dataset summary
        run: python scripts/summarize_dataset.py data/sample_alerts.jsonl --output docs/dataset_summary.md --check

      - name: Check dataset quality gates
        run: python scripts/check_dataset_quality.py data/sample_alerts.jsonl --output docs/dataset_quality.md --check

      - name: Check reviewer notes
        run: python scripts/generate_reviewer_notes.py data/sample_alerts.jsonl --output docs/reviewer_notes.md --check

      - name: Check baseline report
        run: python scripts/generate_baseline_report.py --output docs/baseline_results.md --check

      - name: Check release manifest
        run: python scripts/generate_release_manifest.py --output-json docs/release_manifest.json --output-md docs/release_manifest.md --check

      - name: Run script unit tests
        run: python -m unittest discover -s tests

      - name: Validate sample run config
        run: python scripts/validate_run_config.py examples/run_config.sample.json

      - name: Build prompt batch
        run: python scripts/make_prompt_batch.py data/sample_alerts.jsonl --output .tmp/prompt_batch.jsonl

      - name: Run heuristic baseline
        run: python scripts/run_heuristic_baseline.py data/sample_alerts.jsonl --output .tmp/heuristic_outputs.jsonl

      - name: Validate sample model outputs
        run: python scripts/validate_model_outputs.py data/sample_alerts.jsonl examples/model_outputs.sample.jsonl

      - name: Validate heuristic baseline outputs
        run: python scripts/validate_model_outputs.py data/sample_alerts.jsonl .tmp/heuristic_outputs.jsonl

      - name: Score sample model outputs
        run: python scripts/score_model_outputs.py data/sample_alerts.jsonl examples/model_outputs.sample.jsonl --markdown .tmp/score_report.md

      - name: Score heuristic baseline outputs
        run: python scripts/score_model_outputs.py data/sample_alerts.jsonl .tmp/heuristic_outputs.jsonl --markdown .tmp/heuristic_score_report.md
