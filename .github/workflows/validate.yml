name: Validate Benchmark Data

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate dataset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sample dataset
        run: python scripts/validate_dataset.py data/sample_alerts.jsonl

      - name: Validate sample model outputs
        run: python scripts/validate_model_outputs.py data/sample_alerts.jsonl examples/model_outputs.sample.jsonl
